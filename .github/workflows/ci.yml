name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.20"
            otp: "29"
            # Formatter output and compiler warnings vary across Elixir
            # versions, so lint checks run only on the newest pair.
            lint: true
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-

      - run: mix deps.get

      - run: mix compile --warnings-as-errors
        if: ${{ matrix.lint }}

      - run: mix format --check-formatted
        if: ${{ matrix.lint }}

      - run: mix test
